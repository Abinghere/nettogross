<style>
:root {
  --bg: #0f0f0d;
  --surface: #1a1a16;
  --surface2: #242420;
  --border: #2e2e28;
  --accent: #c8f060;
  --accent2: #f0c060;
  --text: #e8e8e0;
  --muted: #7a7a70;
  --error: #f06060;
  --success: #60f0a0;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 32px 16px 80px;
}

/* ── Ad slots ── */
.ad-slot {
  width: 100%;
  max-width: 640px;
  background: var(--surface);
  border: 1px dashed var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 16px;
}
.ad-slot.banner { height: 60px; }
.ad-slot.rect   { height: 100px; }

/* ── Lang bar ── */
.lang-bar {
  display: flex; gap: 8px; margin-bottom: 40px;
  align-self: flex-end; max-width: 640px; width: 100%;
}
.lang-btn {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--muted); padding: 6px 14px;
  font-family: 'DM Mono', monospace; font-size: 11px;
  cursor: pointer; letter-spacing: 0.05em; transition: all 0.2s;
}
.lang-btn.active, .lang-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ── Install banner ── */
.install-banner {
  display: none;
  width: 100%; max-width: 640px;
  background: var(--surface2); border: 1px solid var(--accent);
  padding: 12px 16px; margin-bottom: 16px;
  font-size: 11px; color: var(--accent);
  align-items: center; justify-content: space-between; gap: 12px;
}
.install-banner.show { display: flex; }
.install-btn {
  background: var(--accent); color: var(--bg);
  border: none; padding: 6px 14px;
  font-family: 'DM Mono', monospace; font-size: 11px;
  font-weight: 500; cursor: pointer; white-space: nowrap;
  letter-spacing: 0.05em;
}

/* ── Container ── */
.container { width: 100%; max-width: 640px; }

header { margin-bottom: 40px; }
.eyebrow { font-size: 10px; letter-spacing: 0.2em; color: var(--accent); text-transform: uppercase; margin-bottom: 12px; }
h1 { font-family: 'Fraunces', serif; font-size: clamp(28px, 6vw, 48px); font-weight: 300; line-height: 1.1; }
h1 em { font-style: italic; color: var(--accent); }
.subtitle { margin-top: 10px; font-size: 12px; color: var(--muted); line-height: 1.6; }

/* ── Card ── */
.card { background: var(--surface); border: 1px solid var(--border); padding: 28px; margin-bottom: 16px; }
.card-title { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 22px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }

.field { margin-bottom: 20px; }
label { display: block; font-size: 10px; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 7px; text-transform: uppercase; }

.input-wrap { position: relative; display: flex; align-items: center; }
.prefix { position: absolute; left: 13px; color: var(--accent); font-size: 14px; font-weight: 500; pointer-events: none; }

input[type="number"], select {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); font-family: 'DM Mono', monospace; font-size: 15px;
  padding: 13px 13px 13px 30px; outline: none; transition: border-color 0.2s;
  -moz-appearance: textfield; appearance: textfield;
}
input[type="number"]::-webkit-outer-spin-button,
input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
input[type="number"]:focus, select:focus { border-color: var(--accent); }
select { padding-left: 13px; cursor: pointer; }

.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }

.city-row { display: flex; gap: 10px; align-items: flex-end; }
.city-row .field { flex: 1; margin-bottom: 0; }

.finder-link {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 10px; color: var(--accent2); text-decoration: none;
  letter-spacing: 0.04em; padding: 13px 0; white-space: nowrap; transition: opacity 0.2s;
}
.finder-link:hover { opacity: 0.7; }

/* withholding note */
.withholding-note {
  display: none;
  background: var(--surface2); border-left: 2px solid var(--accent2);
  padding: 10px 14px; margin-top: -12px; margin-bottom: 20px;
  font-size: 11px; color: var(--accent2); line-height: 1.6;
}
.withholding-note.show { display: block; }

.calc-btn {
  width: 100%; background: var(--accent); color: var(--bg);
  border: none; padding: 17px;
  font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500;
  letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer;
  transition: all 0.2s; margin-top: 6px;
}
.calc-btn:hover { background: var(--text); }

/* ── Results ── */
.results {
  display: none; background: var(--surface);
  border: 1px solid var(--accent); padding: 28px; margin-bottom: 16px;
}
.results.visible { display: block; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

.result-title { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }

.result-row {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 9px 0; border-bottom: 1px solid var(--border); gap: 12px;
}
.result-row:last-of-type { border-bottom: none; }
.result-label { color: var(--muted); font-size: 11px; flex: 1; }
.result-value { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; }
.result-value.highlight { color: var(--accent); font-size: 19px; font-family: 'Fraunces', serif; font-weight: 600; }
.result-value.total { color: var(--accent2); font-size: 19px; font-family: 'Fraunces', serif; font-weight: 600; }

.section-head { font-size: 9px; letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase; padding: 14px 0 4px; opacity: 0.6; }
.divider { height: 1px; background: var(--border); margin: 12px 0; }

/* PDF button */
.pdf-btn {
  width: 100%; background: transparent; color: var(--accent2);
  border: 1px solid var(--accent2); padding: 14px;
  font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500;
  letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer;
  transition: all 0.2s; margin-top: 20px; display: flex;
  align-items: center; justify-content: center; gap: 8px;
}
.pdf-btn:hover { background: var(--accent2); color: var(--bg); }

.disclaimer { font-size: 10px; color: var(--muted); line-height: 1.7; margin-top: 20px; padding-top: 14px; border-top: 1px solid var(--border); }
.error-msg { color: var(--error); font-size: 11px; margin-top: 6px; display: none; }

footer { margin-top: 48px; font-size: 10px; color: var(--muted); text-align: center; letter-spacing: 0.04em; line-height: 2; }
</style>
</head>

  });
}

function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach((b, i) => {
    b.classList.toggle('active', ['en','zh','es'][i] === l);
  });
  applyLang();
  if (lastResult) renderResults(lastResult);
}

// ─── Tax logic ───────────────────────────────────────────────────────────────
// 2026 wage bases
const SS_WAGE_BASE   = 184500;
const FUTA_WAGE_BASE = 7000;
const SUTA_WAGE_BASE = 9000;
const ADD_MED_THRESHOLD = 200000;

function ohioTax(ag) {
  if (ag <= 26050) return 0;
  if (ag <= 46100) return (ag - 26050) * 0.02765;
  if (ag <= 92150) return 554.30 + (ag - 46100) * 0.03226;
  if (ag <= 115300) return 2039.13 + (ag - 92150) * 0.03688;
  return 2893.55 + (ag - 115300) * 0.0399;
}

function fedTax(ag, status) {
  if (status === 'exempt') return 0;
  const std = status === 'married' ? 14600 : 7300;
  const tx = Math.max(0, ag - std);
  if (status === 'married') {
    if (tx <= 23200)  return tx * 0.10;
    if (tx <= 94300)  return 2320 + (tx-23200) * 0.12;
    if (tx <= 201050) return 10852 + (tx-94300) * 0.22;
    if (tx <= 383900) return 34337 + (tx-201050) * 0.24;
    if (tx <= 487450) return 78221 + (tx-383900) * 0.32;
    if (tx <= 731200) return 111357 + (tx-487450) * 0.35;
    return 196669.5 + (tx-731200) * 0.37;
  }
  if (tx <= 11600)  return tx * 0.10;
  if (tx <= 47150)  return 1160 + (tx-11600) * 0.12;
  if (tx <= 100525) return 5426 + (tx-47150) * 0.22;
  if (tx <= 191950) return 17168.5 + (tx-100525) * 0.24;
  if (tx <= 243725) return 39110.5 + (tx-191950) * 0.32;
  if (tx <= 609350) return 55678.5 + (tx-243725) * 0.35;
  return 183647.25 + (tx-609350) * 0.37;
}

function stateTax(ag, status) {
  if (status === 'exempt') return 0;
  return ohioTax(ag);
}

// Wage-base capped per-period amount: how much of gross falls within base
function wageCapped(annualGross, base) {
  return Math.min(annualGross, base);
}

function solveGross(netTarget, cityRate, sutaRate, status, periods) {
  const cr = cityRate / 100;
  const isExempt = status === 'exempt';
  // Initial guess ignoring wage bases
  let g = netTarget / (1 - 0.062 - 0.0145 - cr - (isExempt ? 0 : 0.15));
  for (let i = 0; i < 500; i++) {
    const ag = g * periods;  // annual gross for income tax brackets
    const f    = fedTax(ag, status) / periods;
    const oh   = stateTax(ag, status) / periods;
    // SS: capped per-period at SS_WAGE_BASE (first payroll assumption)
    const ss_ee  = Math.min(g, SS_WAGE_BASE) * 0.062;
    const med_ee = g * 0.0145;
    // Additional Medicare: annualized to determine if threshold crossed
    const add_med = g > ADD_MED_THRESHOLD ? (g - ADD_MED_THRESHOLD) * 0.009 : 0;
    const city   = g * cr;
    const net    = g - f - oh - ss_ee - med_ee - add_med - city;
    const diff   = netTarget - net;
    if (Math.abs(diff) < 0.0005) break;
    g += diff * 0.75;
  }
  return g;
}

const PERIODS = { weekly:52, biweekly:26, semimonthly:24, monthly:12, annually:1 };
const fmt = n => '$' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');

// ─── UI helpers ──────────────────────────────────────────────────────────────
function onStatusChange() {
  const status = document.getElementById('filingStatus').value;
  const note = document.getElementById('withholdingNote');
  note.classList.toggle('show', status === 'exempt');
  liveCalc();
}

let calcTimer = null;
function liveCalc() {
  clearTimeout(calcTimer);
  calcTimer = setTimeout(() => {
    const v = parseFloat(document.getElementById('netPay').value);
    if (v > 0) calculate(true);
  }, 400);
}

function calculate(silent = false) {
  const netVal = parseFloat(document.getElementById('netPay').value);
  const errEl  = document.getElementById('netError');
  if (!netVal || netVal <= 0) {
    if (!silent) {
      errEl.style.display = 'block';
      document.getElementById('results').classList.remove('visible');
    }
    return;
  }
  errEl.style.display = 'none';

  const period    = document.getElementById('payPeriod').value;
  const status    = document.getElementById('filingStatus').value;
  const cityRate  = parseFloat(document.getElementById('cityRate').value) || 0;
  const sutaRate  = parseFloat(document.getElementById('sutaRate').value);
  const sutaRateFinal = isNaN(sutaRate) ? 2.85 : sutaRate;
  const p         = PERIODS[period];

  const gross  = solveGross(netVal, cityRate, sutaRateFinal, status, p);
  const ag     = gross * p;
  const fed    = fedTax(ag, status) / p;
  const ohio   = stateTax(ag, status) / p;

  // SS: capped per-period (first payroll assumption)
  const ss_ee  = Math.min(gross, SS_WAGE_BASE) * 0.062;
  const er_ss  = Math.min(gross, SS_WAGE_BASE) * 0.062;

  // Medicare: no cap
  const med_ee = gross * 0.0145;
  const er_med = gross * 0.0145;

  // Additional Medicare (EE only): per-period gross vs $200k threshold
  const add_med = gross > ADD_MED_THRESHOLD ? (gross - ADD_MED_THRESHOLD) * 0.009 : 0;

  // City tax
  const city   = gross * (cityRate / 100);

  // Net
  const net    = gross - fed - ohio - ss_ee - med_ee - add_med - city;

  // FUTA: capped per-period at $7,000
  const futa   = Math.min(gross, FUTA_WAGE_BASE) * 0.006;

  // SUTA: capped per-period at $9,000 (Ohio)
  const suta   = Math.min(gross, SUTA_WAGE_BASE) * (sutaRateFinal / 100);

  const total  = gross + er_ss + er_med + futa + suta;

  lastResult = { net, gross, fed, ohio, ss_ee, med_ee, add_med, city, cityRate,
                 er_ss, er_med, futa, suta, sutaRateFinal, total, status, period, netVal };
  renderResults(lastResult);

  if (!silent) {
    document.getElementById('results').scrollIntoView({ behavior:'smooth', block:'nearest' });
  }
}

function renderResults(r) {
  const t = T[lang];
  document.getElementById('r_net').textContent   = fmt(r.net);
  document.getElementById('r_gross').textContent = fmt(r.gross);
  document.getElementById('r_fed').textContent   = r.status === 'exempt' ? '$0.00 (exempt)' : fmt(r.fed);
  document.getElementById('r_ohio').textContent  = r.status === 'exempt' ? '$0.00 (exempt)' : fmt(r.ohio);
  document.getElementById('r_ss').textContent    = fmt(r.ss_ee);
  document.getElementById('r_med').textContent   = fmt(r.med_ee);
  document.getElementById('r_er_ss').textContent = fmt(r.er_ss);
  document.getElementById('r_er_med').textContent= fmt(r.er_med);
  document.getElementById('r_futa').textContent  = fmt(r.futa);
  document.getElementById('r_suta').textContent  = fmt(r.suta);
  // Dynamic SUTA label with rate
  document.getElementById('i-r_suta').textContent = t.r_suta + ` (${r.sutaRateFinal}%)`;
  document.getElementById('r_total').textContent = fmt(r.total);

  // Additional Medicare
  if (r.add_med > 0) {
    document.getElementById('addMedRow').style.display = 'flex';
    document.getElementById('r_add_med').textContent = fmt(r.add_med);
  } else {
    document.getElementById('addMedRow').style.display = 'none';
  }

  if (r.cityRate > 0) {
    document.getElementById('cityRow').style.display = 'flex';
    document.getElementById('r_city').textContent    = fmt(r.city);
    document.getElementById('cityLabel').textContent = t.r_city + ` (${r.cityRate}%)`;
  } else {
    document.getElementById('cityRow').style.display = 'none';
  }
  document.getElementById('results').classList.add('visible');
}

// ─── PDF Export ──────────────────────────────────────────────────────────────
function exportPDF() {
  if (!lastResult) return;
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit:'mm', format:'a4' });
  // Chinese fonts not supported by jsPDF, fall back to English for zh
  const t = T[lang === 'zh' ? 'en' : lang];
  const r = lastResult;
  const now = new Date().toLocaleDateString();

  // Header
  doc.setFillColor(15, 15, 13);
  doc.rect(0, 0, 210, 40, 'F');
  doc.setTextColor(200, 240, 96);
  doc.setFontSize(22);
  doc.setFont('helvetica', 'bold');
  doc.text('PayCalc', 20, 20);
  doc.setFontSize(10);
  doc.setFont('helvetica', 'normal');
  doc.setTextColor(122, 122, 112);
  doc.text('Ohio Payroll Estimator · ' + now, 20, 30);

  // Body
  doc.setTextColor(40, 40, 35);
  doc.setFontSize(14);
  doc.setFont('helvetica', 'bold');
  doc.text(lang === 'es' ? 'Desglose' : 'Payroll Breakdown', 20, 55);

  const rows = [
    [t.r_net,    fmt(r.net),   false],
    [t.r_gross,  fmt(r.gross), true],
    ['—', '', false],
    [lang === 'es' ? 'Deducciones' : 'Employee Deductions', '', false],
    [t.r_fed,    r.status==='exempt'?'$0.00 (exempt)':fmt(r.fed), false],
    [t.r_ohio,   r.status==='exempt'?'$0.00 (exempt)':fmt(r.ohio), false],
    [t.r_ss,     fmt(r.ss_ee),  false],
    [t.r_med,    fmt(r.med_ee), false],
    ...(r.add_med > 0 ? [[t.r_add_med, fmt(r.add_med), false]] : []),
    ...(r.cityRate > 0 ? [[(lang === 'es' ? 'Impuesto Municipal' : 'City Tax') + ` (${r.cityRate}%)`, fmt(r.city), false]] : []),
    ['—', '', false],
    [lang === 'es' ? 'Costos Empleador' : 'Employer Costs', '', false],
    [t.r_er_ss,  fmt(r.er_ss),  false],
    [t.r_er_med, fmt(r.er_med), false],
    [t.r_futa,   fmt(r.futa),   false],
    [t.r_suta + ` (${r.sutaRateFinal}%)`,   fmt(r.suta),   false],
    ['—', '', false],
    [t.r_total,  fmt(r.total),  true],
  ];

  let y = 65;
  rows.forEach(([label, value, bold]) => {
    if (label === '—') { y += 4; return; }
    if (!value) {
      doc.setFontSize(8); doc.setTextColor(122,122,112);
      doc.setFont('helvetica','normal');
      doc.text(label.toUpperCase(), 20, y);
      y += 7; return;
    }
    doc.setFontSize(11);
    doc.setFont('helvetica', bold ? 'bold' : 'normal');
    doc.setTextColor(bold ? 15 : 60, bold ? 15 : 60, bold ? 13 : 55);
    doc.text(label, 20, y);
    doc.text(value, 190, y, { align:'right' });
    y += 8;
  });

  // Footer
  doc.setFontSize(8); doc.setTextColor(150,150,140);
  doc.setFont('helvetica','normal');
  doc.text(T[lang === 'zh' ? 'en' : lang].disclaimer, 20, 275, { maxWidth: 170 });

  doc.save('paycalc-report.pdf');
}

// ─── PWA ─────────────────────────────────────────────────────────────────────
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBanner').classList.add('show');
});

function installPWA() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => {
    deferredPrompt = null;
    document.getElementById('installBanner').classList.remove('show');
  });
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

applyLang();
